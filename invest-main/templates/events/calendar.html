{% extends "base.html" %}
{% block title %}Events Calendar{% endblock %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<header class="py-5 bg-light border-bottom">
  <div class="container">
    <h1 class="h3 mb-1">Community Events</h1>
    <p class="text-muted mb-0">Approved events across the CPDA region.</p>
  </div>
</header>

<div class="container py-4">
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-3 p-md-4">
      <div id="calendar"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const res = await fetch("/events/api");
  const events = await res.json();

  const cal = new FullCalendar.Calendar(document.getElementById("calendar"), {
    initialView: "dayGridMonth",
    height: "auto",
    events,
    eventClick: (info) => {
      const p = info.event.extendedProps || {};
      const text =
        (p.location ? `Location: ${p.location}\n` : "") +
        (p.description ? `\n${p.description}` : "");
      alert(`${info.event.title}\n\n${text}`);
    }
  });

  cal.render();
});
</script>

{% endblock %}
